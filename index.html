<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ditto Dards - Trading Cards</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #FAF0DC; --navy: #1a1a2e; --blue-blob: #6BBDE8;
      --orange: #F4813A; --lavender: #C9A8E0; --yellow: #F5C842; --white: #FFFDF7;
    }
    body { font-family: "Inter", sans-serif; background-color: var(--cream); color: var(--navy); min-height: 100vh; display: flex; flex-direction: column; }
    .hero { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 4rem 2rem 2rem; }
    .logo-wrap { width: 420px; height: 420px; display: flex; align-items: center; justify-content: center; margin-bottom: 0.5rem; }
    .logo-wrap img { width: 100%; height: 100%; object-fit: contain; }
    .hero-tagline { font-family: "Nunito", sans-serif; font-weight: 700; font-size: 1.1rem; color: var(--navy); opacity: 0.7; letter-spacing: 3px; text-transform: uppercase; margin-top: 0.5rem; margin-bottom: 2.5rem; }
    .cards-strip { display: flex; justify-content: center; gap: 1rem; padding: 0 2rem 3rem; flex-wrap: wrap; }
    .tag { font-family: "Nunito", sans-serif; font-weight: 700; font-size: 0.85rem; padding: 0.4rem 1rem; border-radius: 999px; border: 2.5px solid var(--navy); background: var(--white); color: var(--navy); letter-spacing: 1px; text-transform: uppercase; }
    .tag.blue   { background: var(--blue-blob); color: var(--white); }
    .tag.purple { background: var(--lavender); color: var(--navy); }
    .tag.yellow { background: var(--yellow); color: var(--navy); }
    .divider { width: 100%; height: 3px; background: var(--navy); }
    .shop { display: flex; flex-direction: column; align-items: center; padding: 4rem 2rem; gap: 1.25rem; text-align: center; }
    .shop h2 { font-family: "Nunito", sans-serif; font-weight: 900; font-size: 2rem; color: var(--navy); }
    .shop p { font-size: 1rem; color: var(--navy); opacity: 0.7; max-width: 440px; line-height: 1.6; }
    .btn-row { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; margin-top: 0.5rem; }
    .btn { display: inline-flex; align-items: center; gap: 0.6rem; font-family: "Nunito", sans-serif; font-weight: 900; font-size: 1rem; padding: 0.85rem 1.75rem; border-radius: 999px; border: 2.5px solid var(--navy); text-decoration: none; transition: transform 0.12s ease, box-shadow 0.12s ease; cursor: pointer; box-shadow: 4px 4px 0 var(--navy); }
    .btn:hover  { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 var(--navy); }
    .btn:active { transform: translate(2px, 2px);  box-shadow: 2px 2px 0 var(--navy); }
    .btn-ebay { background: var(--orange); color: var(--white); }
    .btn-ig   { background: var(--lavender); color: var(--navy); }
    .icon { width: 22px; height: 22px; flex-shrink: 0; }
    .blob-row { display: flex; justify-content: center; gap: 2rem; padding: 0.5rem 2rem 3rem; opacity: 0.22; }
    .blob-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--navy); }
    footer { margin-top: auto; text-align: center; padding: 1.5rem 2rem; background: var(--navy); color: var(--cream); font-size: 0.82rem; font-family: "Nunito", sans-serif; font-weight: 700; letter-spacing: 1px; }
    @media (max-width: 480px) { .logo-wrap { width: 280px; height: 280px; } .shop h2 { font-size: 1.6rem; } .btn { font-size: 0.9rem; padding: 0.75rem 1.4rem; } }
  </style>
</head>
